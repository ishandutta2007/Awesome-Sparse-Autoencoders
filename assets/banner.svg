<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0d0e2e" />
      <stop offset="100%" stop-color="#02000a" />
    </linearGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#251a5c" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradient for Connections -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="50%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
  </defs>

  <style>
    /* CSS Styles & Animations */
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      font-size: 42px;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Outfit', 'Inter', sans-serif;
      font-weight: 300;
      fill: #a0aec0;
      font-size: 16px;
      letter-spacing: 4px;
    }
    .flow-line {
      stroke: url(#lineGrad);
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0.6;
    }
    .pulse-line {
      stroke: #00ffff;
      stroke-width: 2;
      stroke-dasharray: 15, 100;
      stroke-linecap: round;
      animation: dash 6s linear infinite;
    }
    .pulse-line-reverse {
      stroke: #ff007f;
      stroke-width: 2;
      stroke-dasharray: 15, 100;
      stroke-linecap: round;
      animation: dash-reverse 8s linear infinite;
    }
    .node {
      animation: pulse 3s ease-in-out infinite alternate;
    }
    .node-cyan {
      fill: #00ffff;
      filter: url(#glow);
    }
    .node-violet {
      fill: #8a2be2;
      filter: url(#glow);
    }
    .node-pink {
      fill: #ff007f;
      filter: url(#glow);
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -500;
      }
    }
    @keyframes dash-reverse {
      to {
        stroke-dashoffset: 500;
      }
    }
    @keyframes pulse {
      0% {
        r: 6;
        opacity: 0.7;
      }
      100% {
        r: 9;
        opacity: 1;
      }
    }
  </style>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bgGrad)" />
  <rect width="1000" height="300" fill="url(#grid)" />

  <!-- Animated Connection Paths (Sparse Autoencoder bottleneck representation) -->
  <!-- Left to bottleneck -->
  <path d="M 100,80 Q 200,100 450,150" class="flow-line" />
  <path d="M 100,150 Q 200,150 450,150" class="flow-line" />
  <path d="M 100,220 Q 200,200 450,150" class="flow-line" />
  <path d="M 100,80 Q 200,120 550,150" class="flow-line" />
  <path d="M 100,220 Q 200,180 550,150" class="flow-line" />

  <!-- Bottleneck to Right -->
  <path d="M 450,150 Q 750,100 900,80" class="flow-line" />
  <path d="M 450,150 Q 750,150 900,150" class="flow-line" />
  <path d="M 450,150 Q 750,200 900,220" class="flow-line" />
  <path d="M 550,150 Q 750,110 900,80" class="flow-line" />
  <path d="M 550,150 Q 750,190 900,220" class="flow-line" />

  <!-- Signal Pulses (Dynamic Dash Arrays) -->
  <path d="M 100,80 Q 200,100 450,150" class="pulse-line" />
  <path d="M 100,220 Q 200,200 450,150" class="pulse-line" />
  <path d="M 450,150 Q 750,150 900,150" class="pulse-line" />
  <path d="M 550,150 Q 750,110 900,80" class="pulse-line-reverse" />

  <!-- Nodes (Input Layer) -->
  <circle cx="100" cy="80" r="7" class="node-violet" />
  <circle cx="100" cy="150" r="7" class="node-violet" />
  <circle cx="100" cy="220" r="7" class="node-violet" />

  <!-- Bottleneck Nodes (Highly Sparse, Overcomplete representation concept) -->
  <circle cx="450" cy="150" r="8" class="node node-cyan" style="animation-delay: 0s;" />
  <circle cx="550" cy="150" r="8" class="node node-cyan" style="animation-delay: 1.5s;" />

  <!-- Output Nodes (Reconstruction) -->
  <circle cx="900" cy="80" r="7" class="node-pink" />
  <circle cx="900" cy="150" r="7" class="node-pink" />
  <circle cx="900" cy="220" r="7" class="node-pink" />

  <!-- Title & Subtitle -->
  <g transform="translate(500, 75)">
    <text class="title-text" text-anchor="middle" y="0">SPARSE AUTOENCODERS</text>
    <text class="subtitle-text" text-anchor="middle" y="160">EVOLUTION • VARIANTS • APPLICATIONS</text>
  </g>
</svg>
