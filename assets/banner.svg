<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060214" />
      <stop offset="50%" stop-color="#0b0726" />
      <stop offset="100%" stop-color="#02000a" />
    </linearGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1f1654" stroke-width="0.5" opacity="0.25"/>
    </pattern>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for Connections -->
    <linearGradient id="lineGradActive" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="50%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#9d4edd" />
    </linearGradient>
  </defs>

  <style>
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      fill: url(#textGrad);
      font-size: 38px;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Outfit', 'Inter', sans-serif;
      font-weight: 400;
      fill: #7e8c9f;
      font-size: 13px;
      letter-spacing: 5px;
    }
    .flow-line-active {
      stroke: url(#lineGradActive);
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0.8;
    }
    .flow-line-inactive {
      stroke: #2c226d;
      stroke-width: 0.75;
      stroke-linecap: round;
      opacity: 0.3;
      stroke-dasharray: 4, 4;
    }
    .pulse-line {
      stroke: #00ffff;
      stroke-width: 2;
      stroke-dasharray: 10, 80;
      stroke-linecap: round;
      animation: dash 5s linear infinite;
    }
    .node-active-cyan {
      fill: #00ffff;
      filter: url(#glow);
      animation: pulse-glow 2s ease-in-out infinite alternate;
    }
    .node-active-violet {
      fill: #8a2be2;
      filter: url(#glow);
    }
    .node-active-pink {
      fill: #ff007f;
      filter: url(#glow);
    }
    .node-inactive {
      fill: #1a153b;
      stroke: #3c327d;
      stroke-width: 1.5;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -360;
      }
    }
    @keyframes pulse-glow {
      0% {
        opacity: 0.6;
      }
      100% {
        opacity: 1;
      }
    }
  </style>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bgGrad)" />
  <rect width="1000" height="300" fill="url(#grid)" />

  <!-- Left Side: Clean Typography -->
  <g transform="translate(80, 135)">
    <text class="title-text" x="0" y="0">SPARSE AUTOENCODERS</text>
    <text class="subtitle-text" x="0" y="40">EVOLUTION • VARIANTS • APPLICATIONS</text>
  </g>

  <!-- Right Side: Sparse Autoencoder Network Representation (X: 580 to 920) -->
  <g>
    <!-- Inactive Connection Paths -->
    <!-- Inputs to Inactive Bottlenecks -->
    <path d="M 600,90 Q 680,75 760,60" class="flow-line-inactive" />
    <path d="M 600,150 Q 680,150 760,150" class="flow-line-inactive" />
    <path d="M 600,210 Q 680,225 760,240" class="flow-line-inactive" />
    <path d="M 600,90 Q 680,120 760,150" class="flow-line-inactive" />
    <path d="M 600,210 Q 680,180 760,150" class="flow-line-inactive" />

    <!-- Inactive Bottlenecks to Outputs -->
    <path d="M 760,60 Q 840,75 920,90" class="flow-line-inactive" />
    <path d="M 760,150 Q 840,150 920,150" class="flow-line-inactive" />
    <path d="M 760,240 Q 840,225 920,210" class="flow-line-inactive" />
    <path d="M 760,150 Q 840,120 920,90" class="flow-line-inactive" />
    <path d="M 760,150 Q 840,180 920,210" class="flow-line-inactive" />

    <!-- Active Connection Paths (Sparse representation) -->
    <!-- Input 1 & 2 to Bottleneck 2 (Active) -->
    <path d="M 600,90 Q 680,97 760,105" class="flow-line-active" />
    <path d="M 600,150 Q 680,127 760,105" class="flow-line-active" />
    <!-- Input 3 to Bottleneck 4 (Active) -->
    <path d="M 600,210 Q 680,202 760,195" class="flow-line-active" />

    <!-- Bottleneck 2 (Active) to Output 1 & 2 -->
    <path d="M 760,105 Q 840,97 920,90" class="flow-line-active" />
    <path d="M 760,105 Q 840,127 920,150" class="flow-line-active" />
    <!-- Bottleneck 4 (Active) to Output 3 -->
    <path d="M 760,195 Q 840,202 920,210" class="flow-line-active" />

    <!-- Signal Pulses along Active Paths -->
    <path d="M 600,90 Q 680,97 760,105" class="pulse-line" />
    <path d="M 760,105 Q 840,127 920,150" class="pulse-line" style="animation-delay: 1s;" />
    <path d="M 600,210 Q 680,202 760,195" class="pulse-line" style="animation-delay: 2s;" />

    <!-- Input Nodes -->
    <circle cx="600" cy="90" r="6" class="node-active-violet" />
    <circle cx="600" cy="150" r="6" class="node-active-violet" />
    <circle cx="600" cy="210" r="6" class="node-active-violet" />

    <!-- Bottleneck Nodes (Sparse: 5 total, only 2 active/glowing) -->
    <circle cx="760" cy="60" r="6" class="node-inactive" />
    <circle cx="760" cy="105" r="7" class="node-active-cyan" />
    <circle cx="760" cy="150" r="6" class="node-inactive" />
    <circle cx="760" cy="195" r="7" class="node-active-cyan" />
    <circle cx="760" cy="240" r="6" class="node-inactive" />

    <!-- Output Nodes -->
    <circle cx="920" cy="90" r="6" class="node-active-pink" />
    <circle cx="920" cy="150" r="6" class="node-active-pink" />
    <circle cx="920" cy="210" r="6" class="node-active-pink" />
  </g>
</svg>
